<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>

    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(6, 182, 212, 0.05)" stroke-width="1"/>
    </pattern>

    <!-- Text Gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>

    <!-- Accent Gradient -->
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid -->
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Gradient Orbs -->
  <circle cx="200" cy="500" r="250" fill="rgba(6, 182, 212, 0.08)"/>
  <circle cx="1000" cy="150" r="200" fill="rgba(139, 92, 246, 0.08)"/>

  <!-- Main Title -->
  <text x="600" y="280" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="80" font-weight="800" fill="url(#textGrad)" filter="url(#glow)">
    Master GPU Programming
  </text>

  <!-- Subtitle -->
  <text x="600" y="360" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="42" font-weight="500" fill="#cbd5e1">
    Learn Triton & FlashAttention from Scratch
  </text>

  <!-- Feature Pills -->
  <g transform="translate(600, 440)">
    <rect x="-280" y="0" width="160" height="44" rx="22" fill="rgba(6, 182, 212, 0.15)" stroke="rgba(6, 182, 212, 0.3)" stroke-width="1"/>
    <text x="-200" y="29" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="600" fill="#06b6d4">
      ⚡ 99% Memory ↓
    </text>

    <rect x="-80" y="0" width="160" height="44" rx="22" fill="rgba(139, 92, 246, 0.15)" stroke="rgba(139, 92, 246, 0.3)" stroke-width="1"/>
    <text x="0" y="29" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="600" fill="#8b5cf6">
      🚀 1.6x Speedup
    </text>

    <rect x="120" y="0" width="160" height="44" rx="22" fill="rgba(245, 158, 11, 0.15)" stroke="rgba(245, 158, 11, 0.3)" stroke-width="1"/>
    <text x="200" y="29" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="600" fill="#f59e0b">
      🎯 Hands-on
    </text>
  </g>

  <!-- Bottom URL -->
  <text x="600" y="580" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="20" fill="#64748b">
    lessup.github.io/diy-flash-attention
  </text>
</svg>
