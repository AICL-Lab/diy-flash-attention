name: CI

on:
  push:
    branches: [main, master]
    paths-ignore:
      - "docs/.vitepress/dist/**"
  pull_request:
    branches: [main, master]
    paths-ignore:
      - "docs/.vitepress/dist/**"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  openspec-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install OpenSpec
        run: npm install -g @fission-ai/openspec@1.3.1

      - name: Validate OpenSpec specs and active changes
        run: make validate-openspec

  quality:
    needs: openspec-validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy

      - name: Run lint and typecheck
        run: |
          make lint
          make typecheck

  test-cpu:
    needs: openspec-validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev]"

      - name: Run CPU-compatible tests
        run: make test-cpu

  docs:
    needs: openspec-validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build docs
        run: make docs

  # GPU tests would run on self-hosted runners with CUDA
  # test-gpu:
  #   runs-on: [self-hosted, gpu]
  #   steps:
  #     - uses: actions/checkout@v4
  #     - name: Run GPU tests
  #       run: |
  #         pip install -r requirements.txt
  #         pytest tests/ -v
